kind = "web"
previewPath = "/"
title = "Aarvasa – AI Real Estate Platform"
version = "1.0.0"
id = "artifacts/aarvasa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18237

[services.development]
run = "pnpm --filter @workspace/aarvasa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aarvasa", "run", "build" ]
publicDir = "artifacts/aarvasa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18237"
BASE_PATH = "/"
